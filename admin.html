<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | DigitalStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Admin Dashboard</h1>
        
        <div class="bg-slate-800 p-6 rounded-xl mb-10 border border-slate-700">
            <h2 class="text-xl mb-4 font-semibold">Ongeza Bidhaa Mpya</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="p-name" placeholder="Jina la Bidhaa" class="bg-slate-700 p-3 rounded">
                <input type="number" id="p-price" placeholder="Bei (TSh)" class="bg-slate-700 p-3 rounded">
                <input type="text" id="p-img" placeholder="Link ya Picha (Image URL)" class="bg-slate-700 p-3 rounded">
                <textarea id="p-desc" placeholder="Maelezo mafupi" class="bg-slate-700 p-3 rounded"></textarea>
            </div>
            <button onclick="saveToDatabase()" class="mt-4 bg-blue-600 px-8 py-3 rounded-lg font-bold hover:bg-blue-500">
                Hifadhi Bidhaa (Save)
            </button>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-xl mb-4 font-semibold">Oda za Karibuni</h2>
            <div id="orders-list" class="text-gray-400">Hakuna oda bado...</div>
        </div>
    </div>

    <script>
        async function saveToDatabase() {
            const product = {
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                image: document.getElementById('p-img').value,
                desc: document.getElementById('p-desc').value
            };

            // Hapa AI ya Netlify itatumia hii function kuhifadhi kwenye database
            console.log("Inahifadhi bidhaa:", product);
            alert("Bidhaa imehifadhiwa! Sasa itatokea dukani automatic.");
            
            // Hapa ndipo tunapoiambia Netlify ihifadhi data (Netlify Functions itahusika hapa)
        }
    </script>
</body>
</html>
