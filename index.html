<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Shop | Navy Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-navy-dark { background-color: #001B3A; }
        .bg-navy-light { background-color: #003366; }
        .text-navy { color: #001B3A; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-navy-dark p-4 text-white sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">NAVY<span class="text-blue-400">STORE</span></h1>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
            </div>
        </div>
    </nav>

    <header class="bg-navy-light py-12 text-center text-white">
        <h2 class="text-3xl md:text-5xl font-bold mb-2">Welcome to My Store</h2>
        <p class="text-blue-200">Quality Personal Products, Delivered via WhatsApp</p>
    </header>

    <main class="container mx-auto p-6">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="checkout-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
            <h3 class="text-2xl font-bold text-navy-dark mb-4 text-center">Checkout Details</h3>
            <div id="order-summary" class="mb-4 p-3 bg-blue-50 rounded italic text-sm text-gray-600"></div>
            
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Jina Kamili" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-navy-light outline-none">
                <input type="tel" id="cust-phone" placeholder="Namba ya Simu (M-Pesa/Tigo)" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-navy-light outline-none">
                
                <div class="bg-gray-50 p-3 rounded-lg border border-dashed border-navy-light">
                    <p class="text-xs text-gray-500 uppercase font-bold mb-1">Payment Method</p>
                    <label class="flex items-center space-x-2">
                        <input type="radio" checked>
                        <span>Mobile Money / WhatsApp Confirmation</span>
                    </label>
                </div>

                <button onclick="completeOrder()" class="w-full bg-navy-dark text-white py-4 rounded-lg font-bold hover:bg-black transition flex items-center justify-center">
                    <i class="fab fa-whatsapp mr-2 text-xl"></i> COMPLETE ON WHATSAPP
                </button>
                <button onclick="toggleCart()" class="w-full text-gray-400 text-sm">Cancel & Back</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
